<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Active AI Scanner View</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec13",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102210",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "sans": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom vignette for camera overlay */
        .camera-vignette {
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.6) 90%);
        }
        /* Pulse animation for the AI dot */
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(19, 236, 19, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(19, 236, 19, 0); }
            100% { box-shadow: 0 0 0 0 rgba(19, 236, 19, 0); }
        }
        .animate-pulse-green {
            animation: pulse-green 2s infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-white font-display overflow-hidden h-screen w-full relative">
<!-- Camera Background Feed -->
<!-- In a real app, this would be the video element. Here we simulate it with an image. -->
<div class="absolute inset-0 w-full h-full z-0">
<div class="w-full h-full bg-cover bg-center object-cover" data-alt="Close up of a green plant leaf with detailed veins" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCOdDzMXFgVEYSFa6Noho9E2OJhH6saDeqWGKs72zmBSCpQGHDj_u-8rZ8mNbXunn5FpDx3PC4WmnCwLXpTkf9q5g-9XbpUGJ3W4kCOx-VD1vIldg6KcPSTBXGy0p0mu5dJkHIUrll5QOyj5nVk3_M7haKhDRVUfuu6E_QXfpPtmCCsJ_GKe6lF_MZ0ZSHgypQ08Z8wSKs6G_U2bXlc4siB0bVcteECE2bxxrNouJMqfqcEHJTBAhNbjwEp0ihsVStYmF50HSAtlmc');">
</div>
<!-- Vignette Overlay -->
<div class="absolute inset-0 camera-vignette pointer-events-none"></div>
</div>
<!-- Main UI Overlay Container -->
<div class="relative z-10 flex flex-col h-full w-full justify-between safe-area-inset">
<!-- Top Bar -->
<div class="flex items-center justify-between p-4 pt-8 bg-gradient-to-b from-black/60 to-transparent">
<button class="flex items-center justify-center size-10 rounded-full bg-black/30 backdrop-blur-md border border-white/10 text-white hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
<div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-black/40 backdrop-blur-md border border-primary/30">
<div class="size-2 rounded-full bg-primary animate-pulse-green"></div>
<span class="text-xs font-bold tracking-wider uppercase text-primary">AI Active</span>
</div>
<button class="flex items-center justify-center size-10 rounded-full bg-black/30 backdrop-blur-md border border-white/10 text-white hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-2xl">settings</span>
</button>
</div>
<!-- Center Focus Area -->
<div class="flex-1 flex flex-col items-center justify-center w-full px-8 relative">
<!-- Helper Text Top -->
<div class="mb-6 px-4 py-2 rounded-lg bg-black/40 backdrop-blur-sm border border-white/5">
<p class="text-white/90 text-sm font-medium tracking-wide">Align plant in box</p>
</div>
<!-- Reticle / Focus Box -->
<div class="relative w-72 h-72">
<!-- Corners -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-primary rounded-tl-xl shadow-[0_0_15px_rgba(19,236,19,0.5)]"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-primary rounded-tr-xl shadow-[0_0_15px_rgba(19,236,19,0.5)]"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-primary rounded-bl-xl shadow-[0_0_15px_rgba(19,236,19,0.5)]"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-primary rounded-br-xl shadow-[0_0_15px_rgba(19,236,19,0.5)]"></div>
<!-- Center Plus (Optional subtle guide) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-white/20">
<span class="material-symbols-outlined text-4xl font-thin">add</span>
</div>
<!-- Scanning Effect (Subtle moving line) -->
<div class="absolute inset-0 overflow-hidden rounded-xl">
<div class="w-full h-[2px] bg-primary/50 shadow-[0_0_10px_#13ec13] animate-[scan_2s_ease-in-out_infinite] absolute top-0"></div>
</div>
</div>
<!-- Feedback Toast -->
<div class="mt-8 px-4 py-1.5 rounded-full bg-primary/10 border border-primary/20 backdrop-blur-md">
<p class="text-primary text-sm font-bold tracking-wide animate-pulse">HOLD STEADY</p>
</div>
</div>
<!-- Bottom Controls Area -->
<div class="pb-8 pt-4 px-6 bg-gradient-to-t from-black/80 via-black/40 to-transparent flex flex-col items-center gap-6">
<!-- Zoom & Flash Controls Row -->
<div class="flex items-center justify-center gap-8 w-full max-w-sm">
<button class="flex flex-col items-center gap-1 group">
<div class="size-10 flex items-center justify-center rounded-full bg-black/40 backdrop-blur-md border border-white/10 text-white/80 group-hover:bg-primary/20 group-hover:text-primary transition-all">
<span class="material-symbols-outlined text-xl">flash_on</span>
</div>
</button>
<div class="flex items-center bg-black/50 backdrop-blur-md rounded-full p-1 border border-white/10">
<button class="size-9 rounded-full flex items-center justify-center text-xs font-bold text-white/60 hover:text-white transition-colors">
                        .5x
                    </button>
<button class="size-9 rounded-full flex items-center justify-center text-xs font-bold bg-primary text-black shadow-lg shadow-primary/20 scale-110">
                        1x
                    </button>
<button class="size-9 rounded-full flex items-center justify-center text-xs font-bold text-white/60 hover:text-white transition-colors">
                        2x
                    </button>
</div>
<button class="flex flex-col items-center gap-1 group">
<div class="size-10 flex items-center justify-center rounded-full bg-black/40 backdrop-blur-md border border-white/10 text-white/80 group-hover:bg-primary/20 group-hover:text-primary transition-all">
<span class="material-symbols-outlined text-xl">photo_library</span>
</div>
</button>
</div>
<!-- Progress & Status -->
<div class="w-full max-w-xs flex flex-col gap-2">
<div class="flex justify-between items-end px-1">
<p class="text-white text-sm font-medium leading-none">Edge AI Processing...</p>
<p class="text-primary text-xs font-bold leading-none">65%</p>
</div>
<div class="h-1.5 w-full bg-white/20 rounded-full overflow-hidden backdrop-blur-sm">
<div class="h-full bg-primary rounded-full shadow-[0_0_10px_#13ec13] relative overflow-hidden" style="width: 65%;">
<div class="absolute inset-0 bg-white/30 w-full animate-[shimmer_1s_infinite] -skew-x-12 translate-x-[-100%]"></div>
</div>
</div>
</div>
<!-- Main Capture/Action Button (Optional manual trigger) -->
<div class="pt-2">
<button class="relative size-20 rounded-full border-4 border-white/20 flex items-center justify-center group">
<div class="absolute inset-0 rounded-full border-2 border-white/50 scale-110 opacity-0 group-hover:opacity-100 group-hover:scale-125 transition-all duration-300"></div>
<div class="size-16 rounded-full bg-white group-hover:scale-90 transition-transform duration-200 shadow-lg"></div>
</button>
</div>
</div>
</div>
<style>
        /* Custom Keyframe Animations */
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        @keyframes shimmer {
            100% { transform: translateX(100%) skewX(-12deg); }
        }
        
        /* Adjust for iPhone notch/home bar if needed */
        .safe-area-inset {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</body></html>
