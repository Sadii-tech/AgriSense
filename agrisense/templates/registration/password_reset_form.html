{% extends 'registration/base.html' %}

{% block content %}
<div class='text-center mb-3'>
<h3 >Forgot your password?</h3>
</div>
<form method="post" class='text-center'>
  {% csrf_token %}

  <label>Email:</label>
  {{ form.email }}
  <button type="submit" class='btn btn-primary mt-3' >Reset Password</button>
</form>
{% endblock %}
