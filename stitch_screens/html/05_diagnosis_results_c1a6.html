<body class="bg-background-dark min-h-screen flex justify-center w-full overflow-hidden font-body">
<div class="relative flex h-full min-h-screen w-full max-w-md flex-col bg-background-dark shadow-2xl overflow-hidden">
<div class="absolute inset-0 bg-leaf-pattern pointer-events-none opacity-50"></div>
<div class="absolute inset-0 bg-gradient-to-b from-background-dark via-background-dark/95 to-background-dark pointer-events-none"></div>
<div class="relative z-10 flex flex-col h-full px-8 pt-12 pb-8">

<div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-primary to-primary-dark flex items-center justify-center shadow-[0_0_30px_rgba(19,236,19,0.3)] mb-6">
<span class="material-symbols-outlined text-background-dark text-5xl">eco</span>
</div>
<h1 class="text-3xl font-bold text-white tracking-tight">AgriSense <span class="text-primary">AI</span></h1>
<p class="text-gray-400 mt-2 text-sm text-center max-w-[200px]">Advanced Plant Disease Detection</p>
</div>
<div class="w-full mb-8">
<form class="space-y-5">
<div class="space-y-1.5">
<label class="text-xs font-medium text-primary ml-1 uppercase tracking-wide" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-500 group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-surface-dark border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-transparent transition-all" id="email" placeholder="farmer@example.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-medium text-primary ml-1 uppercase tracking-wide" for="password">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-500 group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="block w-full pl-12 pr-12 py-4 bg-surface-dark border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-transparent transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-500 hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
<div class="flex justify-end pt-1">
<a class="text-sm font-medium text-gray-400 hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<button class="w-full bg-primary hover:bg-primary-dark text-background-dark font-bold text-lg py-4 rounded-xl shadow-[0_4px_20px_rgba(19,236,19,0.25)] hover:shadow-[0_6px_25px_rgba(19,236,19,0.35)] transition-all active:scale-[0.98] mt-4" type="button">
                        Log In
                    </button>
</form>
<div class="mt-8 relative flex items-center justify-center">
<div class="absolute inset-x-0 h-px bg-white/10"></div>
<span class="relative bg-background-dark px-4 text-sm text-gray-500">Or continue with</span>
</div>
<div class="grid grid-cols-2 gap-4 mt-8">
<button class="flex items-center justify-center gap-3 py-3.5 px-4 bg-surface-dark hover:bg-surface-darker border border-white/10 rounded-xl transition-all group active:scale-[0.98]">
