<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AgroVision Registration Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec13",
                        "primary-dark": "#0fa80f",
                        "primary-light": "#4aff4a",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102210",
                        "surface-dark": "#1a331a",
                        "surface-darker": "#112211",
                        "input-bg": "#1e3a1e",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Space Grotesk", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            min-height: max(884px, 100dvh);
        }
        .input-focus-ring:focus-within {
            box-shadow: 0 0 0 2px rgba(19, 236, 19, 0.2);
            border-color: #13ec13;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex justify-center w-full overflow-hidden">
<div class="relative flex h-full min-h-screen w-full max-w-md flex-col bg-background-light dark:bg-background-dark shadow-2xl overflow-hidden">
<div class="flex items-center justify-between px-6 pt-8 pb-4 z-10">
<button class="flex items-center justify-center w-10 h-10 rounded-full text-gray-400 hover:bg-surface-dark/50 hover:text-white transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="w-10"></div> 
</div>
<div class="flex-1 overflow-y-auto px-6 pb-24 scrollbar-hide flex flex-col">
<div class="mt-2 mb-8">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-primary/20 text-primary mb-4 border border-primary/20">
<span class="material-symbols-outlined text-3xl">eco</span>
</div>
<h1 class="text-3xl font-bold text-white tracking-tight mb-2">Create Account</h1>
<p class="text-gray-400 text-sm">Join the AgroVision network for smarter, AI-powered farming.</p>
</div>
<form class="space-y-5 flex-1" onsubmit="event.preventDefault()">
<div class="space-y-1.5">
<label class="text-xs font-semibold text-gray-400 uppercase tracking-wider ml-1">Full Name</label>
<div class="relative group input-focus-ring rounded-xl border border-white/10 bg-input-bg transition-colors hover:border-white/20">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-500 group-focus-within:text-primary transition-colors">person</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-transparent border-none text-white placeholder-gray-500 focus:ring-0 sm:text-sm" placeholder="John Doe" type="text"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-semibold text-gray-400 uppercase tracking-wider ml-1">Email Address</label>
<div class="relative group input-focus-ring rounded-xl border border-white/10 bg-input-bg transition-colors hover:border-white/20">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-500 group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-transparent border-none text-white placeholder-gray-500 focus:ring-0 sm:text-sm" placeholder="john@farm.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-semibold text-gray-400 uppercase tracking-wider ml-1">Password</label>
<div class="relative group input-focus-ring rounded-xl border border-white/10 bg-input-bg transition-colors hover:border-white/20">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-500 group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="block w-full pl-12 pr-12 py-4 bg-transparent border-none text-white placeholder-gray-500 focus:ring-0 sm:text-sm" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-500 hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-semibold text-gray-400 uppercase tracking-wider ml-1">Confirm Password</label>
<div class="relative group input-focus-ring rounded-xl border border-white/10 bg-input-bg transition-colors hover:border-white/20">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-500 group-focus-within:text-primary transition-colors">lock_reset</span>
</div>
<input class="block w-full pl-12 pr-12 py-4 bg-transparent border-none text-white placeholder-gray-500 focus:ring-0 sm:text-sm" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-start pt-2">
<div class="flex items-center h-5">
<input class="w-5 h-5 rounded border-gray-600 bg-surface-darker text-primary focus:ring-primary focus:ring-offset-surface-darker focus:ring-offset-0" id="terms" type="checkbox"/>
</div>
<div class="ml-3 text-sm">
<label class="text-gray-400" for="terms">
                            I agree to the <a class="font-medium text-white hover:text-primary underline decoration-primary/50 underline-offset-2" href="#">Terms</a> and <a class="font-medium text-white hover:text-primary underline decoration-primary/50 underline-offset-2" href="#">Privacy Policy</a>
</label>
</div>
</div>
<div class="pt-6">
<button class="w-full bg-primary hover:bg-primary-dark text-background-dark font-bold text-lg py-4 rounded-xl shadow-[0_4px_20px_rgba(19,236,19,0.3)] flex items-center justify-center gap-2 transition-all active:scale-[0.98] group" type="submit">
                        Create Account
                        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-auto py-8 text-center">
<p class="text-gray-400 text-sm">
                    Already have an account? 
                    <a class="font-semibold text-primary hover:text-primary-light transition-colors ml-1" href="#">Log In</a>
</p>
</div>
</div>
<div class="absolute bottom-0 w-full pb-2 pt-4 bg-gradient-to-t from-background-dark to-transparent pointer-events-none">
<div class="flex justify-center">
<div class="w-32 h-1 bg-white/20 rounded-full"></div>
</div>
</div>
</div>

</body></html>
